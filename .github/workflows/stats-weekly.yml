name: Update heavy org stats (weekly)

on:
  schedule:
    - cron: '13 7 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  heavy-stats:
    runs-on: ubuntu-latest
    env:
      PUBLISH_REPOS: >-
        SDRealEstateTokenization
        SDBackendAPI
        SDNextJSfrontend
        SDAdminDashBoard
        SDExplorer
        SDMobile
        SD.com-nextJS-Front-Website
        SD
        api-docs
    steps:
      - uses: actions/checkout@v4

      - name: Install cloc
        run: sudo apt-get update && sudo apt-get install -y cloc jq

      - name: Aggregate LOC + languages + weekly commits
        shell: bash {0}
        env:
          GH_TOKEN: ${{ secrets.ORG_STATS_TOKEN }}
        run: |
          mkdir -p profile/stats

          SINCE=$(date -u -d '7 days ago' +'%Y-%m-%dT%H:%M:%SZ')
          TOTAL_LOC=0
          TOTAL_WEEKLY=0
          : > /tmp/langs.tsv

          for name in $PUBLISH_REPOS; do
            echo "=== $name ==="
            tmpdir=$(mktemp -d)

            if ! git clone --quiet --depth 50 \
                 "https://x-access-token:${GH_TOKEN}@github.com/SecondaryDAO/${name}.git" \
                 "$tmpdir"; then
              echo "clone failed: $name"
              rm -rf "$tmpdir"
              continue
            fi

            loc=$(cloc --quiet --json \
              --exclude-dir=node_modules,dist,build,.next,out,coverage,deployments,artifacts,cache,__pycache__,venv,vendor,locales \
              --exclude-ext=json,lock,svg,png,jpg,jpeg,gif,ico,pdf,csv \
              "$tmpdir" 2>/dev/null \
              | jq -r '.SUM.code // 0' 2>/dev/null)
            loc=${loc:-0}
            TOTAL_LOC=$(( TOTAL_LOC + loc ))
            echo "$name LOC: $loc"

            langs_json=$(gh api "/repos/SecondaryDAO/${name}/languages" 2>/dev/null || echo '{}')
            echo "$langs_json" | jq -r 'to_entries[] | "\(.key)\t\(.value)"' >> /tmp/langs.tsv || true

            weekly=$(gh api graphql -f query="
              query {
                repository(owner: \"SecondaryDAO\", name: \"${name}\") {
                  defaultBranchRef {
                    target {
                      ... on Commit {
                        history(since: \"${SINCE}\") { totalCount }
                      }
                    }
                  }
                }
              }" --jq '.data.repository.defaultBranchRef.target.history.totalCount // 0' 2>/dev/null || echo 0)
            weekly=${weekly:-0}
            TOTAL_WEEKLY=$(( TOTAL_WEEKLY + weekly ))
            echo "$name weekly commits: $weekly"

            rm -rf "$tmpdir"
          done

          format_num() {
            local n="$1"
            if [ -n "$n" ] && [ "$n" -ge 1000 ]; then
              LC_ALL=en_US.UTF-8 printf "%'d" "$n" 2>/dev/null || printf "%s" "$n"
            else
              printf "%s" "$n"
            fi
          }

          loc_fmt=$(format_num "$TOTAL_LOC")
          weekly_fmt=$(format_num "$TOTAL_WEEKLY")

          cat > profile/stats/TOTAL-loc.json <<EOF
          {"schemaVersion":1,"label":"lines of code","message":"${loc_fmt}","color":"1f6feb"}
          EOF
          cat > profile/stats/TOTAL-weekly-commits.json <<EOF
          {"schemaVersion":1,"label":"commits last 7d","message":"${weekly_fmt}","color":"brightgreen"}
          EOF

          python3 - > profile/stats/languages.svg <<'PY'
          import sys, html
          rows = {}
          try:
              with open("/tmp/langs.tsv") as f:
                  for line in f:
                      parts = line.rstrip("\n").split("\t")
                      if len(parts) != 2: continue
                      lang, raw = parts
                      try:
                          b = int(raw)
                      except ValueError:
                          continue
                      rows[lang] = rows.get(lang, 0) + b
          except FileNotFoundError:
              pass

          total = sum(rows.values())
          colors = {
              "JavaScript": "#f1e05a", "TypeScript": "#3178c6", "Solidity": "#AA6746",
              "Python": "#3572A5", "HTML": "#e34c26", "CSS": "#663399",
              "SCSS": "#c6538c", "Shell": "#89e051", "Ruby": "#701516",
              "Go": "#00ADD8", "Rust": "#dea584", "Java": "#b07219",
              "Kotlin": "#A97BFF", "Swift": "#F05138", "Dart": "#00B4AB",
              "C": "#555555", "C++": "#f34b7d", "PHP": "#4F5D95",
              "Dockerfile": "#384d54", "Markdown": "#083fa1",
          }
          fallback = ["#6e7681", "#8957e5", "#db61a2", "#f85149", "#ffa657", "#bf8700"]

          sorted_rows = sorted(rows.items(), key=lambda kv: kv[1], reverse=True)
          top = sorted_rows[:6]
          other = sum(b for _, b in sorted_rows[6:])
          if other > 0:
              top.append(("Other", other))

          width = 720
          bar_h = 14
          legend_y = bar_h + 10

          fb_i = 0
          segments = []
          for name, b in top:
              pct = 100.0 * b / total if total else 0
              w = width * pct / 100.0
              col = colors.get(name)
              if not col:
                  col = fallback[fb_i % len(fallback)]; fb_i += 1
              segments.append((col, name, pct, w))

          out = [f'<svg xmlns="http://www.w3.org/2000/svg" width="{width}" height="30" viewBox="0 0 {width} 30" role="img" aria-label="Language breakdown">']
          out.append(f'<clipPath id="r"><rect x="0" y="0" width="{width}" height="{bar_h}" rx="3"/></clipPath>')
          out.append(f'<rect x="0" y="0" width="{width}" height="{bar_h}" rx="3" fill="#2d333b"/>')
          out.append('<g clip-path="url(#r)">')
          x = 0.0
          for col, name, pct, w in segments:
              out.append(f'<rect x="{x:.2f}" y="0" width="{w:.2f}" height="{bar_h}" fill="{col}"><title>{html.escape(name)} {pct:.1f}%</title></rect>')
              x += w
          out.append('</g>')
          font = 'font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="10"'
          lx = 0
          for col, name, pct, _ in segments:
              out.append(f'<circle cx="{lx+5}" cy="{legend_y+3}" r="4" fill="{col}"/>')
              label = f"{html.escape(name)} {pct:.1f}%"
              out.append(f'<text x="{lx+13}" y="{legend_y+6}" fill="#c9d1d9" {font}>{label}</text>')
              lx += 13 + 7 * len(name) + 8 + 30
          out.append('</svg>')
          sys.stdout.write("".join(out))
          PY

          echo "Totals: LOC ${loc_fmt}, weekly commits ${weekly_fmt}"

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/stats
          if git diff --cached --quiet; then
            echo "No heavy stat changes this run."
            exit 0
          fi
          git commit -m "chore: refresh heavy org stats (weekly)"
          for i in 1 2 3 4 5; do
            if git push; then exit 0; fi
            echo "Push rejected, rebasing (attempt $i/5)"
            git fetch origin main
            git rebase origin/main || { git rebase --abort; exit 1; }
          done
          echo "Failed to push after 5 attempts"; exit 1
